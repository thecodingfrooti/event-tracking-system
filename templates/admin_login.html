{% extends "base.html" %}

{% block content %}
  <section class="section narrow">
    <h1>Admin sign in</h1>
    <p class="helper-text">
      Prototype login: use <code>admin</code> / <code>password</code>.
    </p>
    <form action="{{ url_for('admin_auth') }}" method="post" class="form card">
      <label>
        Username
        <input type="text" name="username" required />
      </label>
      <label>
        Password
        <input type="password" name="password" required />
      </label>
      <button type="submit" class="primary-btn">Sign in</button>
    </form>
  </section>
{% endblock %}
